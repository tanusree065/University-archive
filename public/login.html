<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - University Project Archive</title>
  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Custom CSS -->
  <link rel="stylesheet" href="/css/style.css">
</head>
<body class="min-h-screen flex flex-col justify-between">

  <!-- Navigation Bar placeholder -->
  <div id="navbar-container"></div>

  <!-- Main Login Section -->
  <main class="flex-grow flex items-center justify-center px-4 py-12">
    <div class="w-full max-w-md glass-panel p-8 rounded-2xl bg-slate-900/50 relative border-white/5 overflow-hidden">
      <!-- Glow element in card -->
      <div class="absolute -top-10 -right-10 w-32 h-32 bg-indigo-500/10 rounded-full blur-2xl"></div>
      <div class="absolute -bottom-10 -left-10 w-32 h-32 bg-purple-500/10 rounded-full blur-2xl"></div>

      <div class="text-center mb-8 relative z-10">
        <h2 class="text-3xl font-extrabold tracking-tight text-white mb-2">Welcome Back</h2>
        <p class="text-sm text-gray-400">Sign in to manage and view university archives</p>
      </div>

      <form id="login-form" class="space-y-6 relative z-10">
        <div>
          <label for="email" class="block text-sm font-medium text-gray-300 mb-2">Email Address</label>
          <input 
            type="email" 
            id="email" 
            name="email" 
            required 
            placeholder="name@university.edu"
            class="w-full px-4 py-3 rounded-xl custom-input text-sm"
          >
        </div>

        <div>
          <div class="flex items-center justify-between mb-2">
            <label for="password" class="block text-sm font-medium text-gray-300">Password</label>
          </div>
          <input 
            type="password" 
            id="password" 
            name="password" 
            required 
            placeholder="••••••••"
            class="w-full px-4 py-3 rounded-xl custom-input text-sm"
          >
        </div>

        <button 
          type="submit" 
          class="w-full py-3.5 px-4 bg-gradient-to-r from-indigo-500 to-purple-600 hover:from-indigo-600 hover:to-purple-700 text-white font-semibold rounded-xl shadow-lg shadow-indigo-500/25 transition-all duration-300 transform active:scale-[0.98]"
        >
          Sign In
        </button>
      </form>

      <div class="mt-8 text-center text-sm text-gray-400 relative z-10">
        <span>Don't have an account? </span>
        <a href="/register.html" class="text-indigo-400 hover:text-indigo-300 font-medium transition-colors">Register here</a>
      </div>
    </div>
  </main>

  <!-- Footer -->
  <footer class="py-6 border-t border-white/5 text-center text-xs text-gray-500">
    <p>&copy; 2026 University Research & Project Archive. All rights reserved.</p>
  </footer>

  <!-- Scripts -->
  <script src="/js/api.js"></script>
  <script src="/js/ui.js"></script>
  <script src="/js/login.js"></script>
</body>
</html>
