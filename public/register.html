<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register - University Project Archive</title>
  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Custom CSS -->
  <link rel="stylesheet" href="/css/style.css">
</head>
<body class="min-h-screen flex flex-col justify-between">

  <!-- Navigation Bar placeholder -->
  <div id="navbar-container"></div>

  <!-- Main Register Section -->
  <main class="flex-grow flex items-center justify-center px-4 py-12">
    <div class="w-full max-w-lg glass-panel p-8 rounded-2xl bg-slate-900/50 relative border-white/5 overflow-hidden">
      <!-- Glow element in card -->
      <div class="absolute -top-10 -right-10 w-32 h-32 bg-indigo-500/10 rounded-full blur-2xl"></div>
      <div class="absolute -bottom-10 -left-10 w-32 h-32 bg-purple-500/10 rounded-full blur-2xl"></div>

      <div class="text-center mb-8 relative z-10">
        <h2 class="text-3xl font-extrabold tracking-tight text-white mb-2">Create Account</h2>
        <p class="text-sm text-gray-400">Join the university project and research database</p>
      </div>

      <form id="register-form" class="space-y-5 relative z-10">
        <div>
          <label for="name" class="block text-sm font-medium text-gray-300 mb-1.5">Full Name</label>
          <input 
            type="text" 
            id="name" 
            name="name" 
            required 
            placeholder="John Doe"
            class="w-full px-4 py-3 rounded-xl custom-input text-sm"
          >
        </div>

        <div>
          <label for="email" class="block text-sm font-medium text-gray-300 mb-1.5">Email Address</label>
          <input 
            type="email" 
            id="email" 
            name="email" 
            required 
            placeholder="john.doe@university.edu"
            class="w-full px-4 py-3 rounded-xl custom-input text-sm"
          >
        </div>

        <div>
          <label for="password" class="block text-sm font-medium text-gray-300 mb-1.5">Password</label>
          <input 
            type="password" 
            id="password" 
            name="password" 
            required 
            placeholder="•••••••• (minimum 6 characters)"
            class="w-full px-4 py-3 rounded-xl custom-input text-sm"
            minlength="6"
          >
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
          <div>
            <label for="role" class="block text-sm font-medium text-gray-300 mb-1.5">Account Role</label>
            <select 
              id="role" 
              name="role" 
              class="w-full px-4 py-3 rounded-xl custom-input text-sm bg-slate-800"
            >
              <option value="guest">Guest / Observer</option>
              <option value="student">Student Uploader</option>
              <option value="teacher">Teacher Reviewer</option>
            </select>
          </div>

          <div id="department-container" class="hidden">
            <label for="department" class="block text-sm font-medium text-gray-300 mb-1.5">Department</label>
            <input 
              type="text" 
              id="department" 
              name="department" 
              placeholder="e.g. Computer Science"
              class="w-full px-4 py-3 rounded-xl custom-input text-sm"
            >
          </div>
        </div>

        <button 
          type="submit" 
          class="w-full py-3.5 px-4 mt-2 bg-gradient-to-r from-indigo-500 to-purple-600 hover:from-indigo-600 hover:to-purple-700 text-white font-semibold rounded-xl shadow-lg shadow-indigo-500/25 transition-all duration-300 transform active:scale-[0.98]"
        >
          Create Account
        </button>
      </form>

      <div class="mt-8 text-center text-sm text-gray-400 relative z-10">
        <span>Already have an account? </span>
        <a href="/login.html" class="text-indigo-400 hover:text-indigo-300 font-medium transition-colors">Sign in here</a>
      </div>
    </div>
  </main>

  <!-- Footer -->
  <footer class="py-6 border-t border-white/5 text-center text-xs text-gray-500">
    <p>&copy; 2026 University Research & Project Archive. All rights reserved.</p>
  </footer>

  <!-- Scripts -->
  <script src="/js/api.js"></script>
  <script src="/js/ui.js"></script>
  <script src="/js/register.js"></script>
</body>
</html>
